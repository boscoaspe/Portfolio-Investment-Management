<script>

{id:"VOO",ticker:"VOO",isin:"US9229087690",name:"Vanguard S&P 500 ETF",type:"ETF",currency:"USD",shares:2,avgCostEUR:385,invInitEUR:770,currentPrice:480,valEUR:827.59,rendBruto:57.59,roiEUR:.0748,roiDIV:.0748,cagr:.07,category:"Core",sector:"Diversified",geo:"EEUU",status:"ACTIVA"}

{id:1,date:"2025-01-15",ticker:"AAPL",name:"Apple Inc.",isin:"US0378331005",type:"BUY",shares:5,price:165,cur:"USD",comm:1,fx:1.08,cat:"Growth",sect:"Tech",geo:"EEUU"},
{id:2,date:"2025-01-15",ticker:"VOO",name:"Vanguard S&P 500 ETF",isin:"US9229087690",type:"BUY",shares:2,price:440,cur:"USD",comm:0,fx:1.08,cat:"Core",sect:"Diversified",geo:"EEUU"}
];

let S={sortM:null,sortD:1,sortR:null,sortRD:1,pos:JSON.parse(JSON.stringify(P0)),txns:JSON.parse(JSON.stringify(T0)),fxRates:JSON.parse(JSON.stringify(FX0)),hist:HIST0.map(h=>({date:h.d,tv:h.tv||0,tc:h.tc||0,pnl:h.pnl||0,b100:h.b,ps:h.p})),tab:"dashboard",sf:false,fMov:"",
welcome:true,

rptSet:{language:"en",reportStyle:"detailed",includeWeights:true,includePL:true,sections:{macro:true,equityTable:true,equityDetails:true,commodities:true,etfs:true,themes:true,watchlist:true,opportunities:true,observations:true}},
rptPrompt:"",rptNotes:"",rptWLForm:false,rptPUndo:[],rptPRedo:[],driveClientId:""};
const esc=s=>!s?"":String(s).replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;").replace(/"/g,"&quot;").replace(/'/g,"&#x27;");
const ef=v=>v==null||isNaN(v)?"—":`${v<0?"-":""}€${Math.abs(v).toLocaleString("es-ES",{minimumFractionDigits:2,maximumFractionDigits:2})}`;
const pf=v=>v==null||isNaN(v)?"—":`${v>=0?"+":""}${(v*100).toFixed(2)}%`;
const nf=(v,d=2)=>v==null||isNaN(v)?"—":Number(v).toLocaleString("es-ES",{minimumFractionDigits:d,maximumFractionDigits:d});
const cc=v=>v>=0?"gr":"rd";const fp=tk=>S.pos.find(x=>x.id===tk||x.ticker===tk);
const toE=(v,c)=>c==="EUR"?v:(S.fxRates[c]?v/S.fxRates[c]:v);
const txE=(t)=>t.cur==="EUR"?t.price:(t.fx&&t.fx>0?t.price/t.fx:toE(t.price,t.cur));
const UNDO_MAX=30;let undoStack=[],redoStack=[];
function pushUndo(){try{undoStack.push(JSON.stringify({p:S.pos,t:S.txns,f:S.fxRates,h:S.hist,wl:S.watchlist,rs:S.rptSet}));if(undoStack.length>UNDO_MAX)undoStack.shift();redoStack=[]}catch{}}
function undo(){if(undoStack.length===0){showToast("Nada que deshacer");return}redoStack.push(JSON.stringify({p:S.pos,t:S.txns,f:S.fxRates,h:S.hist,wl:S.watchlist,rs:S.rptSet}));const prev=JSON.parse(undoStack.pop());S.pos=prev.p;S.txns=prev.t;S.fxRates=prev.f;S.hist=prev.h;if(prev.wl)S.watchlist=prev.wl;if(prev.rs)S.rptSet={...S.rptSet,...prev.rs,sections:{...S.rptSet.sections,...(prev.rs.sections||{})}};try{localStorage.setItem("gs15",JSON.stringify(prev))}catch{}showToast("↩ Deshecho");R()}
function redo(){if(redoStack.length===0){showToast("Nada que rehacer");return}undoStack.push(JSON.stringify({p:S.pos,t:S.txns,f:S.fxRates,h:S.hist,wl:S.watchlist,rs:S.rptSet}));const next=JSON.parse(redoStack.pop());S.pos=next.p;S.txns=next.t;S.fxRates=next.f;S.hist=next.h;if(next.wl)S.watchlist=next.wl;if(next.rs)S.rptSet={...S.rptSet,...next.rs,sections:{...S.rptSet.sections,...(next.rs.sections||{})}};try{localStorage.setItem("gs15",JSON.stringify(next))}catch{}showToast("↪ Rehecho");R()}
function showToast(msg){const t=document.createElement("div");t.style.cssText="position:fixed;bottom:20px;left:50%;transform:translateX(-50%);background:var(--g);color:#2A4A62;padding:8px 20px;border-radius:6px;font-size:12px;font-weight:600;z-index:999;font-family:'DM Sans',sans-serif;box-shadow:0 4px 16px rgba(0,0,0,.3)";t.textContent=msg;document.body.appendChild(t);setTimeout(()=>t.remove(),1800)}
document.addEventListener("keydown",e=>{if((e.metaKey||e.ctrlKey)&&e.key==="z"&&!e.shiftKey){e.preventDefault();undo()}if((e.metaKey||e.ctrlKey)&&(e.key==="y"||(e.key==="z"&&e.shiftKey))){e.preventDefault();redo()}});
function sv(){pushUndo();try{localStorage.setItem("gs15",JSON.stringify({p:S.pos,t:S.txns,f:S.fxRates,h:S.hist,wl:S.watchlist,rs:S.rptSet,dc:S.driveClientId}))}catch{}}

function expData(){const d=JSON.stringify({p:S.pos,t:S.txns,f:S.fxRates,h:S.hist,wl:S.watchlist,rs:S.rptSet,dc:S.driveClientId},null,2);const b=new Blob([d],{type:"application/json"});const u=URL.createObjectURL(b);const a=document.createElement("a");a.href=u;a.download="portfolio_backup_"+new Date().toISOString().split("T")[0]+".json";a.click();URL.revokeObjectURL(u)}
function impData(e){const f=e.target.files[0];if(!f)return;const r=new FileReader();r.onload=function(ev){try{const d=JSON.parse(ev.target.result);if(!d.p||!d.t){alert("Archivo no válido");return}if(!confirm("¿Importar datos? Se sobreescribirán los actuales."))return;if(d.p)S.pos=d.p;if(d.t)S.txns=d.t;if(d.f)S.fxRates=d.f;if(d.h)S.hist=d.h;if(d.wl)S.watchlist=d.wl;if(d.rs)S.rptSet={...S.rptSet,...d.rs,sections:{...S.rptSet.sections,...(d.rs.sections||{})}};if(d.dc)S.driveClientId=d.dc;sv();R();alert("Datos importados correctamente")}catch(err){alert("Error al leer: "+err.message)}};r.readAsText(f)}
function lo(){try{const d=JSON.parse(localStorage.getItem("gs15"));if(d){S.welcome=false;if(d.p)S.pos=d.p;if(d.t)S.txns=d.t;if(d.f)S.fxRates=d.f;if(d.h&&d.h.length>0)S.hist=d.h;if(d.wl)S.watchlist=d.wl;if(d.rs)S.rptSet={...S.rptSet,...d.rs,sections:{...S.rptSet.sections,...(d.rs.sections||{})}};if(d.dc)S.driveClientId=d.dc}}catch{}
// Ensure HIST0 data is present with pre-computed values
const existDates=new Set(S.hist.map(x=>x.date));
HIST0.forEach(h=>{
const existing=S.hist.findIndex(x=>x.date===h.d);
const entry={date:h.d,tv:h.tv||0,tc:h.tc||0,pnl:h.pnl||0,b100:h.b,ps:h.p};
if(existing>=0){if(!S.hist[existing].tv||S.hist[existing].tv===0)S.hist[existing]=entry}
else S.hist.push(entry)});
S.hist.sort((a,b)=>a.date.localeCompare(b.date));
// Cleanup: remove obviously corrupted price entries from snapshots
// Build expected price ranges from HIST0 reference data
const refPrices={};HIST0.forEach(h=>{if(h.p)Object.entries(h.p).forEach(([tk,v])=>{if(!refPrices[tk])refPrices[tk]=[];refPrices[tk].push(v)})});
S.hist.forEach(snap=>{if(!snap.ps)return;Object.keys(snap.ps).forEach(tk=>{const v=snap.ps[tk];if(v<=0){delete snap.ps[tk];return}const refs=refPrices[tk];if(refs&&refs.length>0){const med=refs.slice().sort((a,b)=>a-b)[Math.floor(refs.length/2)];if(v<med*0.005||v>med*200)delete snap.ps[tk]}})})}
function rc(p){if(p.shares<=0){p.valEUR=0;p.rendBruto=0;p.roiEUR=0;p.invInitEUR=0;return}p.valEUR=toE(p.shares*p.currentPrice,p.currency);p.rendBruto=p.valEUR-p.invInitEUR;p.roiEUR=p.invInitEUR>0?p.rendBruto/p.invInitEUR:0}

function recalcCAGR(p){
if(p.shares<=0||p.invInitEUR<=0||p.valEUR<=0){p.cagr=0;return}
// Find first BUY date for this ticker
const buys=S.txns.filter(t=>t.ticker===p.ticker&&t.type==="BUY").sort((a,b)=>a.date.localeCompare(b.date));
if(buys.length===0){p.cagr=0;return}
const firstDate=new Date(buys[0].date);
const days=(Date.now()-firstDate)/(86400e3);
if(days<30){p.cagr=0;return}
const years=days/365.25;
p.cagr=Math.pow(p.valEUR/p.invInitEUR,1/years)-1;
// Also recalc roiDIV
if(p.currency!=="EUR"&&p.shares>0){
const avgDIV=buys.reduce((s,t)=>s+t.shares*t.price,0)/buys.reduce((s,t)=>s+t.shares,0);
if(avgDIV>0)p.roiDIV=p.currentPrice/avgDIV-1;
}else{p.roiDIV=p.roiEUR}}
function rebuildPos(tk){const p=fp(tk);if(!p)return;const txs=[...S.txns].filter(t=>t.ticker===tk).sort((a,b)=>a.date.localeCompare(b.date)||a.id-b.id);let sh=0,tc=0;for(const t of txs){const e=txE(t);if(t.type==="BUY"){tc+=t.shares*e;sh+=t.shares}else{const av=sh>0?tc/sh:0;tc-=t.shares*av;sh=Math.max(0,sh-t.shares)}if(t.cat)p.category=t.cat;if(t.sect)p.sector=t.sect;if(t.geo)p.geo=t.geo;if(t.isin&&t.isin!==tk)p.isin=t.isin;if(t.name&&t.name!==tk)p.name=t.name;p.currency=t.cur}p.shares=sh;p.invInitEUR=tc;p.avgCostEUR=sh>0?tc/sh:0;p.status=sh>0?"ACTIVA":"CERRADA";rc(p);recalcCAGR(p)}
function snap(date){const a=S.pos.filter(p=>p.shares>0);const tv=a.reduce((s,p)=>s+p.valEUR,0);const tc=a.reduce((s,p)=>s+p.invInitEUR,0);const ps={};a.forEach(p=>{if(p.currentPrice>0)ps[p.ticker]=p.currentPrice});const base0=S.hist.length>0&&S.hist[0].b100?S.hist[0]:null;const firstTV=base0?null:tv;const b100=S.hist.length>0?(()=>{const f=S.hist[0];const fv=f.tv||tv;return fv>0?tv/fv*100:100})():100;const i=S.hist.findIndex(x=>x.date===date);if(i>=0)S.hist[i]={date,tv,tc,pnl:tv-tc,b100,ps};else S.hist.push({date,tv,tc,pnl:tv-tc,b100,ps});S.hist.sort((a,b)=>a.date.localeCompare(b.date));if(S.hist.length>500)S.hist=S.hist.slice(-500)}
function calcTax(g){if(g<=0)return{tax:0,er:0,bd:[]};const br=[{to:6000,r:.19},{to:50000,r:.21},{to:200000,r:.23},{to:300000,r:.27},{to:1e15,r:.28}];let rem=g,tax=0,prev=0,bd=[];for(const b of br){const w=b.to-prev,tx=Math.min(rem,w);if(tx<=0)break;const t=tx*b.r;bd.push({f:prev,t:b.to>=1e15?null:b.to,r:b.r,base:tx,tax:t});tax+=t;rem-=tx;prev=b.to}return{tax,er:g>0?tax/g:0,bd}}
function compReal(){const sr=[...S.txns].sort((a,b)=>a.date.localeCompare(b.date)||a.id-b.id);const hd={};const rl=[];for(const t of sr){const tk=t.ticker;if(!hd[tk])hd[tk]={sh:0,c:0,nm:t.name||tk};const h=hd[tk];if(t.name)h.nm=t.name;const ep=txE(t);if(t.type==="BUY"){h.c+=t.shares*ep;h.sh+=t.shares}else{const av=h.sh>0?h.c/h.sh:0;const sv2=t.shares*ep;const cb=t.shares*av;rl.push({date:t.date,tk,nm:h.nm,sh:t.shares,buyE:av,sellE:ep,cb,sv:sv2,cm:t.comm,pnl:sv2-cb-t.comm});h.c-=cb;h.sh=Math.max(0,h.sh-t.shares)}}return rl}
function pie(data,sz){const t=data.reduce((s,d)=>s+d.v,0);if(!t)return"";const cl=["#C4A265","#5B8DEF","#3ECF8E","#EF5350","#9B7DDB","#F5A623","#4ECDC4","#FF6B9D","#78909C","#E0A0FF"];let c=0;return`<div class="fx ac" style="gap:16px"><svg width="${sz||140}" height="${sz||140}" viewBox="0 0 42 42"><circle cx="21" cy="21" r="15.9" fill="transparent" stroke="var(--s2)" stroke-width="5.5"/>${data.map((d,i)=>{const p=d.v/t*100,o=25-c;c+=p;return`<circle cx="21" cy="21" r="15.9" fill="transparent" stroke="${cl[i%cl.length]}" stroke-width="5.5" stroke-dasharray="${p} ${100-p}" stroke-dashoffset="${o}"/>`}).join("")}</svg><div class="fx fc" style="gap:2px">${data.filter(d=>d.v>0).map((d,i)=>`<div class="fx ac" style="gap:5px;font-size:10px"><div style="width:6px;height:6px;border-radius:50%;background:${cl[i%cl.length]};flex-shrink:0"></div><span class="dm" style="min-width:48px">${d.l}</span><span class="b">${(d.v/t*100).toFixed(1)}%</span></div>`).join("")}</div></div>`}
function svgLine(pts,w,ht,color,label){if(pts.length<2)return"";const mn=Math.min(...pts.map(p=>p.y)),mx=Math.max(...pts.map(p=>p.y)),rng=mx-mn||1,pad=35;const coords=pts.map((p,i)=>`${pad+i*(w-2*pad)/Math.max(pts.length-1,1)},${ht-pad-(p.y-mn)/rng*(ht-2*pad)}`).join(" ");
// Area fill
const first=coords.split(" ")[0],last=coords.split(" ").pop();
const areaPath=`M${first} ${coords.split(" ").join(" L")} L${last.split(",")[0]},${ht-pad} L${first.split(",")[0]},${ht-pad} Z`;
return`<defs><linearGradient id="gf_${color.replace(/[^a-zA-Z0-9]/g,'')}" x1="0" y1="0" x2="0" y2="1"><stop offset="0%" stop-color="${color}" stop-opacity=".15"/><stop offset="100%" stop-color="${color}" stop-opacity="0"/></linearGradient></defs><path d="${areaPath}" fill="url(#gf_${color.replace(/[^a-zA-Z0-9]/g,'')})" /><polyline points="${coords}" fill="none" stroke="${color}" stroke-width="1.5"/>${pts.map((p,i)=>{const cx=pad+i*(w-2*pad)/Math.max(pts.length-1,1),cy=ht-pad-(p.y-mn)/rng*(ht-2*pad);return`<circle class="cp" cx="${cx}" cy="${cy}" r="3" fill="${color}" stroke="var(--s1)" stroke-width="1.5" opacity=".6" data-tip-date="${p.x}" data-tip-val="${nf(p.y,2)}" data-tip-color="${color}" onmouseenter="showTip(evt)" onmouseleave="hideTip()"/>`}).join("")}<text x="${w-pad+4}" y="${ht-pad-(pts[pts.length-1].y-mn)/rng*(ht-2*pad)+4}" fill="${color}" font-size="8" font-family="DM Sans">${label||""}</text><text x="${pad}" y="${ht-5}" fill="var(--td)" font-size="8" font-family="DM Sans">${pts[0].x}</text><text x="${w-pad}" y="${ht-5}" fill="var(--td)" font-size="8" font-family="DM Sans" text-anchor="end">${pts[pts.length-1].x}</text><text x="${pad-4}" y="${pad-2}" fill="var(--td)" font-size="8" font-family="DM Sans" text-anchor="end">${nf(mx,1)}</text><text x="${pad-4}" y="${ht-pad+2}" fill="var(--td)" font-size="8" font-family="DM Sans" text-anchor="end">${nf(mn,1)}</text>`}

function R(){
const a=S.pos.filter(p=>p.shares>0),$=document.getElementById("app");$.className="w";
if(S.welcome){
$.innerHTML=`<div style="max-width:640px;margin:60px auto;text-align:center">

  if(cu!=="EUR"&&!S.fxRates[cu])S.fxRates[cu]=fxv;
  rebuildPos(tk);snap(d);S.sf=false;sv();R();
}

function genRptPrompt(){
const notesEl=document.getElementById("rptNotes");if(notesEl)S.rptNotes=notesEl.value;
S.rptPUndo=[];S.rptPRedo=[];
const rs=S.rptSet,act=S.pos.filter(p=>p.shares>0),total=act.reduce((s,p)=>s+p.valEUR,0);
const langMap={en:'English',es:'Spanish',fr:'French',de:'German',it:'Italian',pt:'Portuguese',zh:'Chinese',ja:'Japanese',ko:'Korean',ar:'Arabic'};
const lang=langMap[rs.language]||rs.language||'English';
const depth=rs.reportStyle==='detailed'?'6-7 pages equivalent, highly detailed per asset with company communications, analyst commentary, and named price targets':'3-4 pages equivalent, concise summaries per asset';
const pfLines=act.map(p=>`- ${p.ticker} (${esc(p.name)}) | Type: ${p.type} | Category: ${p.category} | Currency: ${p.currency} | Shares: ${p.shares} | Avg Buy Price (€): ${nf(p.avgCostEUR)} | Invested: €${nf(p.invInitEUR)} | Current Price: ${p.currency==='EUR'?'€':'$'}${nf(p.currentPrice)} | Value: €${nf(p.valEUR)} | Weight: ${(total>0?(p.valEUR/total*100):0).toFixed(1)}% | ROI: ${pf(p.roiEUR)} | CAGR: ${p.cagr?pf(p.cagr):'—'} | Sector: ${p.sector||''} | Geo: ${p.geo||''}`).join('\n');
const wlLines=S.watchlist.map(w=>`- ${w.ticker} (${esc(w.name)}) | Type: ${w.type} | Reason: ${esc(w.reason)}`).join('\n');
let secI='';
if(rs.sections.macro)secI+='\n## MACRO OVERVIEW\nCurrent market conditions, key geopolitical events, rate decisions, oil prices, dollar index, VIX. Include specific numbers.\n';
if(rs.sections.equityTable)secI+='\n## EQUITIES SUMMARY TABLE\nQuick-reference table: Ticker | Price | 52-wk Range | Analyst Target | Rating | Weekly Signal.\n';
if(rs.sections.equityDetails)secI+=`\n## DETAILED EQUITY REVIEWS\nFor EACH equity position include:\n- Current price and recent price action with reasons for any significant movement\n- Recent company communications and announcements (earnings, partnerships, product launches, capital raises)\n- Management commentary on future vision, strategy, and how they are tackling challenges\n- Named analyst moves with specific price targets and rating changes (e.g. "Piper Sandler raised to $110 from $105")\n- Key upcoming catalysts\n${rs.includePL?'- Purchase price, date, and current P&L':''}\n${rs.includeWeights?'- Portfolio weight':''}\n`;
if(rs.sections.commodities)secI+='\n## COMMODITIES & CRYPTO\nDetailed analysis of gold (physical AU + ETF XAU) and Bitcoin. Include: price levels, technical support/resistance, institutional forecasts (JP Morgan, Goldman, etc.), and key drivers.\n';
if(rs.sections.etfs)secI+='\n## ETFs & FUNDS\nPerformance context for each ETF/fund holding. Market conditions affecting them.\n';
if(rs.sections.themes)secI+='\n## KEY THEMES TO WATCH THIS WEEK\n4-5 specific themes with catalysts, dates, and how they impact different portfolio positions.\n';
if(rs.sections.watchlist&&S.watchlist.length>0)secI+='\n## WATCHLIST ANALYSIS\nFor each watchlist item, search for the latest data and provide:\n- Current price and recent performance\n- Key news and developments\n- Analyst consensus and targets\n- Why it may or may not be a good entry point right now\n';
if(rs.sections.opportunities)secI+='\n## NEW OPPORTUNITIES\nResearch and suggest 5-7 new investment ideas beyond the watchlist. Include stocks (any sector, global), ETFs, and commodities. Base recommendations on current market conditions and thematic momentum.\n';
if(rs.sections.observations)secI+='\n## PORTFOLIO OBSERVATIONS\nAllocation analysis (Growth/Core/Value/Shield breakdown), sector concentration risks, geographic exposure, risk map (highest conviction, highest risk, deepest value positions), and upcoming earnings dates.\n';

S.rptPrompt=`Generate my weekly portfolio report as a downloadable PDF. Search the web for the latest data on each position.

LANGUAGE: ${lang}
DEPTH: ${depth}

PORTFOLIO (${act.length} positions, ~€${nf(total,0)} total)
${pfLines}
${S.watchlist.length>0&&(rs.sections.watchlist||rs.sections.opportunities)?`
WATCHLIST
${wlLines}`:''}

SECTIONS TO INCLUDE
${secI}

CONTENT INSTRUCTIONS
- For equities: always search for the latest news, company announcements, and analyst updates. Explain WHY prices moved.
- For each analyst mention, include the firm name, rating, and specific price target.
- For each asset, include recent company communications: earnings results, partnerships, product launches, capital raises, management commentary on vision/strategy.
- ${rs.includePL?'Include purchase price, date, and P&L per position.':'Do not include purchase/P&L data.'}
- ${rs.includeWeights?'Include portfolio weight per position.':'Do not include weight data.'}

PDF OUTPUT — DESIGN SPECIFICATIONS
Generate the report as a PDF file (${rs.reportStyle==='detailed'?'6-7':'3-4'} pages, A4) using Python ReportLab. Follow these exact design specs:

STRUCTURE & LAYOUT:
- Page size: A4 with 20mm left/right margins, 34mm top margin, 18mm bottom margin
- Use ReportLab platypus (SimpleDocTemplate, Paragraph, Spacer, Table, TableStyle, HRFlowable, KeepTogether)
- Wrap each asset block in KeepTogether to prevent awkward page breaks mid-asset

HEADER & FOOTER (drawn on every page via onFirstPage/onLaterPages):
- Header: Full-width rectangle (28mm tall) in dark navy (#0f3460). Title "WEEKLY PORTFOLIO UPDATE" in white Helvetica-Bold 16pt. Subtitle with week date in white Helvetica 10pt. Below the bar: a thin 1.5mm accent line in teal (#16a596).
- Footer: Small disclaimer text in gray (#7a7a8a) Helvetica 6.5pt on the left, page number on the right.

COLOR PALETTE:
- Navy blue: #0f3460 (headers, section titles, ticker names, table header row)
- Teal: #16a596 (accent lines, horizontal rules between sections)
- Gold: #d4a84b (opportunity section titles)
- Text dark: #1a1a2e | Text medium: #4a4a5a | Text light: #7a7a8a
- Alternating table rows: white and #f7f9fc
- Table grid: #e0e0e6, 0.3pt

TYPOGRAPHY:
- Section headers: Helvetica-Bold 13pt in navy, spaceBefore=14, spaceAfter=3
- Each section header followed by a teal HRFlowable (0.5pt)
- Intro/macro text: Helvetica 9.5pt, dark, 14pt leading, justified
- Asset ticker titles: Helvetica-Bold 10pt in navy, spaceBefore=10
- Asset metadata line: Helvetica 7.5pt in light gray (52-wk range, analyst target, rating, etc.)
- Asset body text: Helvetica 8.5pt in medium gray, 12.5pt leading, justified, spaceAfter=3
- Use <b> tags in Paragraph for bold emphasis within body text

EQUITIES SUMMARY TABLE:
- Column widths: [26mm, 20mm, 28mm, 26mm, 22mm, 52mm] for Ticker|Price|52-Wk Range|Analyst Tgt|Rating|Weekly Signal

ASSET BLOCKS:

- Metadata line: gray 7.5pt with key stats

- 2.5mm spacer between each asset block, each wrapped in KeepTogether

NEW OPPORTUNITIES: Use gold (#d4a84b) Helvetica-Bold 9.5pt for titles.
PORTFOLIO OBSERVATIONS: Use bold topic leads.

GENERAL:
- Be generous with spacing, clean and professional
- Never use unicode bullet characters
- Never use newlines inside Paragraphs — use separate Paragraph elements${S.rptNotes?`

ADDITIONAL NOTES FROM INVESTOR
${S.rptNotes}`:''}`;

R();
}

const DRIVE_SCOPE='https://www.googleapis.com/auth/drive.file';
const DRIVE_FILENAME='portfolio_backup.json';
let _gToken=null;

function saveDriveId(){const v=document.getElementById('driveClientId').value.trim();if(!v||!v.includes('.')){showToast('Client ID no válido');return}S.driveClientId=v;sv();showToast('✅ Client ID guardado');R()}

function driveAuth(){return new Promise((resolve,reject)=>{if(_gToken){resolve(_gToken);return}
if(!window.google||!google.accounts){showToast('Google API no cargada. Recarga la página.');reject();return}
const client=google.accounts.oauth2.initTokenClient({client_id:S.driveClientId,scope:DRIVE_SCOPE,callback:(resp)=>{if(resp.error){showToast('Error de autenticación');reject(resp);return}_gToken=resp.access_token;setTimeout(()=>{_gToken=null},3500*1000);resolve(resp.access_token)}});
client.requestAccessToken()})}

async function driveFindFile(token){const r=await fetch('https://www.googleapis.com/drive/v3/files?q=name%3D%27'+DRIVE_FILENAME+'%27+and+trashed%3Dfalse&spaces=drive&fields=files(id,name,modifiedTime)',{headers:{Authorization:'Bearer '+token}});const d=await r.json();return d.files&&d.files.length>0?d.files[0]:null}

async function driveSave(){const btn=document.getElementById('driveSaveBtn');if(btn)btn.textContent='⏳ Guardando...';
try{const token=await driveAuth();
const data=JSON.stringify({p:S.pos,t:S.txns,f:S.fxRates,h:S.hist,wl:S.watchlist,rs:S.rptSet});
const existing=await driveFindFile(token);
const metadata={name:DRIVE_FILENAME,mimeType:'application/json'};
const boundary='----PortfolioBoundary';
const body='--'+boundary+'\r\nContent-Type: application/json; charset=UTF-8\r\n\r\n'+JSON.stringify(metadata)+'\r\n--'+boundary+'\r\nContent-Type: application/json\r\n\r\n'+data+'\r\n--'+boundary+'--';
let url='https://www.googleapis.com/upload/drive/v3/files?uploadType=multipart';
let method='POST';
if(existing){url='https://www.googleapis.com/upload/drive/v3/files/'+existing.id+'?uploadType=multipart';method='PATCH'}
const r=await fetch(url,{method,headers:{Authorization:'Bearer '+token,'Content-Type':'multipart/related; boundary='+boundary},body});
if(r.ok){showToast('☁️ Guardado en Google Drive')}else{const e=await r.json();showToast('Error: '+(e.error?.message||'desconocido'))}
}catch(e){showToast('Error al guardar')}finally{if(btn)btn.textContent='☁️ Guardar en Drive'}}

async function driveLoad(){const btn=document.getElementById('driveLoadBtn');if(btn)btn.textContent='⏳ Cargando...';
try{const token=await driveAuth();
const file=await driveFindFile(token);
if(!file){showToast('No hay backup en Drive');if(btn)btn.textContent='📥 Cargar desde Drive';return}
const r=await fetch('https://www.googleapis.com/drive/v3/files/'+file.id+'?alt=media',{headers:{Authorization:'Bearer '+token}});
const d=await r.json();
if(!d.p||!d.t){showToast('Archivo no válido');if(btn)btn.textContent='📥 Cargar desde Drive';return}
if(!confirm('¿Cargar datos desde Drive? ('+new Date(file.modifiedTime).toLocaleString()+')\\nSe sobreescribirán los datos actuales.')){{if(btn)btn.textContent='📥 Cargar desde Drive';return}}
pushUndo();
if(d.p)S.pos=d.p;if(d.t)S.txns=d.t;if(d.f)S.fxRates=d.f;if(d.h)S.hist=d.h;if(d.wl)S.watchlist=d.wl;if(d.rs)S.rptSet={...S.rptSet,...d.rs,sections:{...S.rptSet.sections,...(d.rs.sections||{})}};
try{localStorage.setItem("gs15",JSON.stringify({p:S.pos,t:S.txns,f:S.fxRates,h:S.hist,wl:S.watchlist,rs:S.rptSet,dc:S.driveClientId}))}catch{}
showToast('☁️ Datos cargados desde Drive');R()
}catch(e){showToast('Error al cargar')}finally{if(btn)btn.textContent='📥 Cargar desde Drive'}}

function hideTip(){const tip=document.getElementById("chartTip");if(tip)tip.classList.remove("on")}

lo();R();
